# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v0.2.7/docs/schemas/icp-yaml-schema.json
#
# Standalone deployment for the SSO-gated test app. Deploy against a
# replica that already hosts the Internet Identity instance whose
# bundles you want to trust (local, testnet, or mainnet), then set
# `trusted_attribute_signers` to that II canister's principal.

canisters:
  - name: sso_gated_app
    build:
      steps:
        - type: script
          commands:
            - "./build.sh"
            - 'cp sso_gated_app.wasm.gz "$ICP_WASM_OUTPUT_PATH"'
    settings:
      environment_variables:
        # The II canister principal whose signature the IC must have
        # verified on the attribute bundle. This default is MAINNET
        # Internet Identity — override it with the principal of the II
        # instance you are actually testing against (e.g. a local or
        # testnet deployment of the role-enforcement build).
        trusted_attribute_signers: "rdmx6-jaaaa-aaaaa-aaadq-cai"

        # "Trusted domains": the exact origin(s) allowed to appear in
        # the bundle's `implicit:origin`. Matched verbatim (scheme +
        # host), comma-separated. This is where the app frontend is
        # served from — here, the Cloudflare tunnel.
        frontend_origins: "https://screenshot-parents-explosion-display.trycloudflare.com"

        # Org SSO domain(s) accepted for `sso:<domain>:*` keys.
        # REQUIRED for SSO enforcement: if unset, every SSO bundle is
        # rejected as #UntrustedSsoSource.
        trusted_sso_domains: "dfinity.org"
